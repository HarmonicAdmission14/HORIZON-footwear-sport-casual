<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - HORIZON</title>
    <link rel="stylesheet" href="Horizon.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .auth-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #00C985;
        }

        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00C985;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00C985, #00b377);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 201, 133, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 201, 133, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }

        .auth-footer a {
            color: #00C985;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .logo {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }

        .logo i {
            color: #00C985;
        }

        /* Сообщение об ошибке/успехе */
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #ffe5e5;
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }

        .message.success {
            background: #e5fff0;
            color: #00C985;
            border: 1px solid #00C985;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-box">
            <div class="logo">
                <i class="fa-solid fa-shield-halved"></i> HORIZON
            </div>

            <div class="auth-header">
                <h1>Создать аккаунт</h1>
                <p>Присоединяйтесь к HORIZON уже сегодня</p>
            </div>

            <div id="message" class="message"></div>

            <form id="registerForm">
                <div class="form-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" placeholder="Имя пользователя" required minlength="3">
                </div>

                <div class="form-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" placeholder="Email адрес" required>
                </div>

                <div class="form-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" placeholder="Пароль" required minlength="6">
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    Зарегистрироваться <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="auth-footer">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Останавливаем стандартную отправку

            const btn = document.getElementById('submitBtn');
            const message = document.getElementById('message');
            const formData = new FormData(this);

            // Валидация
            const username = formData.get('username').trim();
            const email = formData.get('email').trim();
            const password = formData.get('password');

            if (username.length < 3) {
                showMessage('Имя должно быть не менее 3 символов', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Пароль должен быть не менее 6 символов', 'error');
                return;
            }

            // Проверка на существующего пользователя
            let users = JSON.parse(localStorage.getItem('users')) || [];
            const existingUser = users.find(u => u.email === email);

            if (existingUser) {
                showMessage('Этот email уже зарегистрирован', 'error');
                return;
            }

            // Блокировка кнопки на время обработки
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Обработка...';

            // Сохранение пользователя
            const userData = {
                id: Date.now(),
                username: username,
                email: email,
                password: password, // В реальном проекте пароли нужно хэшировать!
                registeredAt: new Date().toISOString()
            };

            users.push(userData);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(userData));

            // Успешная регистрация
            showMessage('✅ Регистрация успешна! Перенаправление...', 'success');
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Готово!';
            btn.style.background = '#00C985';

            // Переход на главную через 1.5 секунды
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        });

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = 'message ' + type;
            message.style.display = 'block';

            if (type === 'error') {
                setTimeout(() => {
                    message.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
